<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pitch Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Auth Screens -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">&#9917;</div>
        <h1>Pitch Manager</h1>
        <p class="auth-subtitle">Build your football empire</p>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="auth-form">
        <h2>Sign In</h2>
        <div class="form-group">
          <label>Username or Email</label>
          <input type="text" id="login-username" placeholder="Enter username or email" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
        </div>
        <div id="login-error" class="form-error"></div>
        <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="#" onclick="showRegister()">Create one</a></p>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="auth-form" style="display:none">
        <h2>Create Account</h2>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="Enter your email" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password">
        </div>
        <div id="register-error" class="form-error"></div>
        <button class="btn btn-primary btn-full" onclick="handleRegister()">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="#" onclick="showLogin()">Sign in</a></p>
      </div>
    </div>
  </div>

  <!-- Club Creation Screen -->
  <div id="club-create-screen" class="auth-screen" style="display:none">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">&#9917;</div>
        <h1>Create Your Club</h1>
        <p class="auth-subtitle">Establish your football legacy</p>
      </div>
      <div class="auth-form">
        <div class="form-group">
          <label>Club Name</label>
          <input type="text" id="club-name" placeholder="e.g. FC Phoenix">
        </div>
        <div class="form-group">
          <label>Stadium Name</label>
          <input type="text" id="club-stadium" placeholder="e.g. Phoenix Arena">
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" id="club-city" placeholder="e.g. Phoenix">
        </div>
        <div id="club-create-error" class="form-error"></div>
        <button class="btn btn-primary btn-full" onclick="handleCreateClub()">Create Club</button>
      </div>
    </div>
  </div>

  <!-- Main App - Top Eleven Style Layout -->
  <div id="app" class="app" style="display:none">
    
    <!-- Top Bar - Club Info -->
    <header class="top-bar">
      <div class="top-bar-left">
        <div class="club-badge-small" id="top-bar-badge"></div>
        <div class="club-info-mini">
          <span class="club-name-mini" id="top-bar-club-name">Club</span>
          <span class="club-balance-mini" id="top-bar-balance">$0</span>
        </div>
      </div>
      <div class="top-bar-right">
        <button class="icon-btn" onclick="showNotifications()" id="notif-btn">
          <span class="icon">&#128276;</span>
          <span class="notif-badge" id="notif-badge" style="display:none">0</span>
        </button>
        <button class="icon-btn" onclick="handleLogout()">
          <span class="icon">&#9211;</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
      <!-- Pages rendered here by JS -->
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
      <button class="nav-tab active" data-section="home" onclick="switchSection('home')">
        <span class="nav-icon">&#9750;</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-tab" data-section="squad" onclick="switchSection('squad')">
        <span class="nav-icon">&#9734;</span>
        <span class="nav-label">Squad</span>
      </button>
      <button class="nav-tab" data-section="matches" onclick="switchSection('matches')">
        <span class="nav-icon">&#9917;</span>
        <span class="nav-label">Matches</span>
      </button>
      <button class="nav-tab" data-section="transfers" onclick="switchSection('transfers')">
        <span class="nav-icon">&#8644;</span>
        <span class="nav-label">Transfers</span>
      </button>
      <button class="nav-tab" data-section="club" onclick="switchSection('club')">
        <span class="nav-icon">&#9881;</span>
        <span class="nav-label">Club</span>
      </button>
    </nav>

    <!-- Sub Navigation (contextual) -->
    <nav id="sub-nav" class="sub-nav" style="display:none">
      <!-- Populated dynamically based on section -->
    </nav>
  </div>

  <!-- Match Viewer Overlay -->
  <div id="match-viewer-overlay" class="mv-overlay" style="display:none">
    <div class="mv-container">
      <div class="mv-topbar">
        <div class="mv-team mv-team-home">
          <div class="mv-team-badge" id="mv-home-badge"></div>
          <span class="mv-team-name" id="mv-home-name">Home</span>
        </div>
        <div class="mv-score">
          <span id="mv-home-score">0</span>
          <span class="mv-score-sep">-</span>
          <span id="mv-away-score">0</span>
        </div>
        <div class="mv-team mv-team-away">
          <span class="mv-team-name" id="mv-away-name">Away</span>
          <div class="mv-team-badge" id="mv-away-badge"></div>
        </div>
      </div>
      <div class="mv-pitch-wrap">
        <canvas id="mv-canvas"></canvas>
      </div>
      <div class="mv-controls">
        <button class="mv-btn" id="mv-pause-btn" onclick="mvTogglePause()">&#9654; Pause</button>
        <div class="mv-speed-group">
          <button class="mv-btn mv-speed active" data-speed="1" onclick="mvSetSpeed(1)">1x</button>
          <button class="mv-btn mv-speed" data-speed="2" onclick="mvSetSpeed(2)">2x</button>
          <button class="mv-btn mv-speed" data-speed="4" onclick="mvSetSpeed(4)">4x</button>
          <button class="mv-btn mv-speed" data-speed="0" onclick="mvSetSpeed(0)">Skip</button>
        </div>
        <button class="mv-btn mv-close-btn" onclick="closeMatchViewer()">Close</button>
      </div>
      <div class="mv-commentary">
        <div class="mv-commentary-header">Live Commentary</div>
        <div id="mv-commentary-list" class="mv-commentary-list"></div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Action Sheet (Bottom Sheet) -->
  <div id="action-sheet-overlay" class="action-sheet-overlay" onclick="closeActionSheet()">
    <div class="action-sheet" onclick="event.stopPropagation()">
      <div class="action-sheet-header">
        <span id="action-sheet-title">Options</span>
        <button class="action-sheet-close" onclick="closeActionSheet()">&times;</button>
      </div>
      <div id="action-sheet-content" class="action-sheet-content"></div>
    </div>
  </div>

  <script src="/match-viewer.js"></script>
  <script src="/app.js"></script>
</body>
</html>
